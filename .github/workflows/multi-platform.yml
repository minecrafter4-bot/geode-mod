        id: mod
        shell: bash
        run: |
          version="$(jq -r '.version' mod.json)"

          if [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "Cannot resolve mod version from mod.json" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

