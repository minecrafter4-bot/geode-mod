        id: notes
        uses: actions/github-script@v7
        env:
          VERSION: ${{ steps.mod.outputs.version }}
        with:
          script: |
            const { owner, repo } = context.repo;

            let commits = [];

            const associatedPulls = await github.paginate(
              github.rest.repos.listPullRequestsAssociatedWithCommit,
              {
                owner,
                repo,
                commit_sha: context.payload.after,
                per_page: 100,
              },
            );

            const mergedPull = associatedPulls.find((pull) => {
              return pull.merged_at && pull.base.ref === 'main';
            });

            if (mergedPull) {
              core.info(`Using commits from PR #${mergedPull.number} for release notes.`);
              commits = await github.paginate(
                github.rest.pulls.listCommits,
                {
                  owner,
                  repo,
                  pull_number: mergedPull.number,
                  per_page: 100,
                },
              );
            } else {
              core.info('Using pushed commits for release notes.');
              const before = context.payload.before;
              const after = context.payload.after;

              if (before && after && !/^0+$/.test(before)) {
                commits = await github.paginate(
                  github.rest.repos.compareCommitsWithBasehead,
                  {
                    owner,
                    repo,
                    basehead: `${before}...${after}`,
                    per_page: 100,
                  },
                  response => response.data.commits,
                );
              } else {
                commits = context.payload.commits || [];
              }
            }

            if (commits.length === 0) {
              core.warning('No commits found for release notes.');
              core.setOutput('notes', '');
              core.setOutput('title', '');
              core.setOutput('tag', '');
              return;
            }

            const featItems = [];
            let hasFix = false;

            for (const commit of commits) {
              const message = commit.commit?.message || commit.message || '';
              const firstLine = message.split('\n')[0].trim();

              const match = firstLine.match(
                /^(?<type>[a-z]+)(?:\([^)]+\))?(?<breaking>!)?:\s+(?<subject>.+)$/i
              );

              if (!match?.groups) continue;

              const type = match.groups.type.toLowerCase();
              const subject = match.groups.subject.trim();

              if (type === 'feat') {
                featItems.push(`- ${subject}`);
              } else if (type === 'fix') {
                hasFix = true;
              }
            }

            const items = [...featItems];
            if (hasFix) items.push('- Bug fixes and improvements');

            if (items.length === 0) {
              core.warning('No feat or fix commits found; skipping release creation.');
              core.setOutput('notes', '');
              core.setOutput('title', '');
              core.setOutput('tag', '');
              return;
            }

            core.setOutput('title', process.env.VERSION);
            core.setOutput('tag', process.env.VERSION);
            core.setOutput('notes', items.join('\n'));

